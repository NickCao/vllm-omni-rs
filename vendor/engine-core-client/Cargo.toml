[package]
name = "vllm-engine-core-client"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[dependencies]
arc-swap = "1.9"
bytemuck = { version = "1.25", features = ["extern_crate_alloc"] }
byteorder = "1.5"
bytes = "1.12"
easy-ext = "1.0"
enum-as-inner = "0.7"
futures = "0.3"
half = { version = "2.7", features = ["bytemuck"] }
hex = "0.4"
itertools = "0.14"
parking_lot = "0.12"
rmp-serde = "1.3"
rmpv = { version = "1.3", features = ["with-serde"] }
serde = { version = "1", features = ["derive"] }
serde_default = "0.2"
serde_json = { version = "1", features = ["preserve_order"] }
serde_repr = "0.1"
serde_tuple = "1.1"
serde_with = "3.18"
task-local = "0.1"
thiserror = "2.0"
thiserror-ext = "0.3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
vllm-metrics = { path = "../metrics" }
zeromq = { version = "0.6.0", default-features = false, features = ["tokio-runtime", "all-transport"] }
